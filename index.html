
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spartan Sprint Trainer — Corey</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--card:#13131a;--card2:#1c1c27;--border:#2a2a3a;
  --orange:#f97316;--orange-dim:#7c3810;--green:#34d399;
  --purple:#a78bfa;--blue:#38bdf8;--red:#f87171;
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;
}
html,body{background:var(--bg);min-height:100vh;font-family:'Oswald','Impact',sans-serif;color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#app{display:flex;justify-content:center;min-height:100vh}
.screen{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;margin:0 auto}
.page{flex:1;overflow-y:auto;padding:16px 16px 92px;display:flex;flex-direction:column;gap:12px}
.page-header{font-size:22px;font-weight:700;color:var(--orange);letter-spacing:2px;margin-bottom:4px}
.hidden{display:none!important}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#0d0d14;border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{background:#15151f}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:'Oswald',sans-serif}
.hero-card{background:linear-gradient(135deg,#1a0a00 0%,#2d1000 50%,#1a0500 100%);border:1px solid var(--orange-dim);border-radius:16px;padding:20px;text-align:center}
.hero-label{font-size:11px;letter-spacing:4px;color:var(--orange);margin-bottom:4px}
.hero-title{font-size:28px;font-weight:700;letter-spacing:2px}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:12px}
.hero-countdown{background:rgba(249,115,22,0.12);border-radius:12px;padding:12px 0}
.hero-num{font-size:52px;font-weight:700;color:var(--orange);line-height:1}
.hero-unit{font-size:11px;letter-spacing:3px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.section-title{font-size:11px;letter-spacing:3px;color:var(--dim);margin-bottom:4px}
.big-btn{background:var(--orange);color:#000;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;width:100%;font-family:'Oswald',sans-serif;margin-top:4px}
.ghost-btn{background:none;color:var(--dim);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;cursor:pointer;width:100%;font-family:'Oswald',sans-serif;margin-top:6px}
.done-badge{background:#0d3320;color:var(--green);border:1px solid var(--green);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:1px}
.bar-bg{height:8px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.start-btn{background:var(--orange);color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;font-family:'Oswald',sans-serif}
.rest-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;gap:12px}
.macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.macro-box{background:var(--card);border-radius:12px;padding:12px 16px}
.macro-note{font-size:11px;color:var(--dim);background:#1a1a10;border:1px solid #333310;border-radius:8px;padding:8px 12px;line-height:1.5;font-family:'Inter',sans-serif}
.phase-banner{background:linear-gradient(90deg,#0f0a20,#180a30);border:1px solid #3730a3;border-radius:10px;padding:10px 14px}
.day-tabs{display:flex;gap:6px;flex-wrap:wrap}
.day-tab{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'Oswald',sans-serif}
.day-tab.active{background:var(--orange);color:#000;border-color:var(--orange)}
.ex-card{background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.ex-name{font-size:15px;font-weight:600}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px;font-family:'Inter',sans-serif}
.ex-rest-tag{font-size:11px;color:var(--dim);margin-top:4px}
.phase-note{font-size:11px;color:var(--purple);background:#0f0a20;border:1px solid #3730a3;border-radius:6px;padding:6px 10px;margin-top:6px;font-family:'Inter',sans-serif;line-height:1.5}
.progress-bar{height:4px;background:var(--card2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--orange);border-radius:99px;transition:width .3s}
.ex-progress{font-size:12px;color:var(--muted);text-align:right;letter-spacing:1px;margin-top:4px}
.active-ex-card{background:linear-gradient(135deg,#1a1000,#2a1500);border:1px solid var(--orange-dim);border-radius:16px;padding:24px;text-align:center}
.active-ex-name{font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.2}
.active-ex-detail{font-size:26px;font-weight:700;color:var(--orange);margin-bottom:4px}
.active-ex-weight{font-size:13px;color:var(--muted);margin-bottom:16px;font-family:'Inter',sans-serif}
.sets-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.set-dot{width:34px;height:34px;border-radius:99px;background:var(--card2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted)}
.set-dot.done{background:var(--orange);border-color:var(--orange);color:#000}
.rest-timer-box{background:linear-gradient(135deg,#0a0a20,#150a30);border:1px solid #3730a3;border-radius:20px;padding:40px;text-align:center;margin:8px 0}
.rest-timer-label{font-size:14px;letter-spacing:4px;color:#818cf8;margin-bottom:8px}
.rest-timer-num{font-size:72px;font-weight:700;color:#a5b4fc;line-height:1}
.skip-rest-btn{margin-top:20px;background:#1e1b4b;color:#818cf8;border:1px solid #3730a3;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif}
.done-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 0;text-align:center}
.done-title{font-size:28px;font-weight:700;color:var(--orange);letter-spacing:2px}
.done-sub{font-size:16px;color:var(--muted);letter-spacing:4px}
.race-countdown{background:linear-gradient(90deg,#1a0a00,#2d1500);border:1px solid var(--orange-dim);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.cal-nav{display:flex;align-items:center;justify-content:space-between}
.cal-nav-btn{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:20px;cursor:pointer;font-family:'Oswald',sans-serif}
.cal-day{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative}
.cal-day.today{border-color:var(--orange);background:#1a0e00}
.cal-day.rest-day{opacity:.5}
.cal-day-left{min-width:44px}
.cal-day-name{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:2px}
.cal-day-num{font-size:14px;font-weight:700;color:var(--muted)}
.cal-day-num.today-num{color:var(--orange)}
.cal-day-right{flex:1}
.cal-workout-name{font-size:13px;font-weight:600}
.cal-workout-meta{font-size:11px;color:var(--muted)}
.cal-phase-tag{font-size:10px;letter-spacing:1px;margin-top:2px}
.cal-done{position:absolute;right:14px;color:var(--green);font-weight:700;font-size:16px}
.nutrition-summary{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border)}
.cals-display{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.cals-num{font-size:36px;font-weight:700;color:var(--orange)}
.cals-of{font-size:13px;color:var(--muted)}
.macro-row-small{display:flex;gap:16px}
.macro-mini{display:flex;flex-direction:column;gap:1px}
.macro-mini-label{font-size:10px;color:var(--dim);letter-spacing:1px}
.water-box{background:var(--card);border-radius:12px;padding:14px;border:1px solid #164e63}
.water-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.water-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.water-btn{flex:1;min-width:60px;background:#0c2b3a;color:var(--blue);border:1px solid #164e63;border-radius:8px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif}
.meal-tabs{display:flex;gap:6px}
.meal-tab{flex:1;background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:10px 4px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'Oswald',sans-serif}
.meal-tab.active{background:#1a1500;color:var(--orange);border-color:var(--orange)}
.meal-list{display:flex;flex-direction:column;gap:6px}
.meal-item{background:var(--card2);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.meal-item-name{font-size:14px;font-weight:600}
.meal-item-meta{font-size:11px;color:var(--muted);font-family:'Inter',sans-serif}
.remove-btn{background:none;color:var(--dim);border:none;font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.scan-btn{background:var(--card);color:var(--blue);border:1px solid #164e63;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;letter-spacing:2px;font-family:'Oswald',sans-serif}
.scan-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:8px;display:flex;flex-direction:column;gap:10px}
.camera-wrap{position:relative;border-radius:12px;overflow:hidden;background:#000;width:100%;aspect-ratio:4/3;max-height:260px}
#cam-video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-frame{width:72%;aspect-ratio:2.2/1;border:3px solid var(--orange);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.cam-label{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.8);letter-spacing:2px;font-family:'Oswald',sans-serif}
.cam-controls{display:flex;gap:8px}
.cam-btn{flex:1;background:#0c2b3a;color:var(--blue);border:1px solid #164e63;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif}
.scan-or{text-align:center;font-size:11px;color:var(--dim);letter-spacing:2px}
.barcode-row{display:flex;gap:8px}
.barcode-row input{flex:1}
.lookup-btn{background:var(--blue);color:#000;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;white-space:nowrap}
.scan-error{font-size:12px;color:var(--red);font-family:'Inter',sans-serif}
.scan-result-card{background:#0c1f10;border:1px solid #166534;border-radius:10px;padding:12px}
.scan-result-name{font-size:15px;font-weight:700;color:var(--green)}
.scan-result-meta{font-size:12px;color:var(--muted);margin-bottom:8px;font-family:'Inter',sans-serif}
.add-food-btn{background:var(--green);color:#000;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif}
.scan-note{font-size:10px;color:var(--dim);text-align:center;font-family:'Inter',sans-serif;line-height:1.5}
input{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;font-family:'Oswald',sans-serif;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--orange)}
.macro-input-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.macro-input-row input{text-align:center;padding:8px 4px;font-size:12px}
.stat-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-card{background:var(--card);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--border)}
.stat-card-num{font-size:28px;font-weight:700;color:var(--orange)}
.stat-card-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.history-card{background:var(--card);border-radius:12px;padding:14px 16px;border:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
.history-date{font-size:11px;color:var(--dim);letter-spacing:1px}
.history-label{font-size:15px;font-weight:700}
.history-meta{font-size:12px;color:var(--muted);font-family:'Inter',sans-serif}
.empty-state{text-align:center;color:var(--dim);font-size:14px;padding:40px 0;line-height:1.8;font-family:'Inter',sans-serif}
.loading-msg{display:flex;align-items:center;justify-content:center;padding:14px;color:var(--dim);font-size:13px;gap:8px;font-family:'Inter',sans-serif}
</style>
</head>
<body>
<div id="app"><div class="screen">
  <div id="page-home"     class="page"></div>
  <div id="page-workout"  class="page hidden"></div>
  <div id="page-calendar" class="page hidden"></div>
  <div id="page-nutrition"class="page hidden"></div>
  <div id="page-history"  class="page hidden"></div>
  <nav>
    <button class="nav-btn active" data-tab="home"      onclick="switchTab('home')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn"        data-tab="workout"   onclick="switchTab('workout')"><span class="nav-icon">💪</span><span class="nav-label">Train</span></button>
    <button class="nav-btn"        data-tab="calendar"  onclick="switchTab('calendar')"><span class="nav-icon">📅</span><span class="nav-label">Plan</span></button>
    <button class="nav-btn"        data-tab="nutrition" onclick="switchTab('nutrition')"><span class="nav-icon">🥗</span><span class="nav-label">Fuel</span></button>
    <button class="nav-btn"        data-tab="history"   onclick="switchTab('history')"><span class="nav-icon">📊</span><span class="nav-label">History</span></button>
  </nav>
</div></div>
<script>
// ── RACE CONFIG ──────────────────────────────────────────────────────────────
const RACE_DATE  = new Date("2026-09-12T08:00:00");
const PLAN_START = new Date("2026-05-26");
const TODAY = (()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; })();
 
function weeksUntilRace(){
  const ms = RACE_DATE - new Date();
  return Math.max(0, Math.ceil(ms/(7*24*60*60*1000)));
}
function weekOfPlan(){
  const ms = TODAY - PLAN_START;
  return Math.min(16, Math.max(1, Math.ceil(ms/(7*24*60*60*1000))));
}
function getCurrentPhase(wk){
  wk = wk || weekOfPlan();
  if(wk<=4)  return {num:1,name:"Base",    color:"#34d399"};
  if(wk<=8)  return {num:2,name:"Build",   color:"#38bdf8"};
  if(wk<=12) return {num:3,name:"Specific",color:"#f97316"};
  if(wk<=15) return {num:4,name:"Peak",    color:"#f43f5e"};
               return {num:5,name:"Taper",  color:"#a78bfa"};
}
 
// ── MACRO GOALS (training day, from doc) ────────────────────────────────────
const MACRO = { calories:2650, protein:210, carbs:230, fat:85, water:128 };
 
// ── WORKOUT DATA (from SPARTA_1.docx) ───────────────────────────────────────
const PLAN = {
  Monday:{label:"Lower Body Strength + Grip",type:"strength",icon:"🦵",exercises:[
    {name:"Treadmill Warm-Up",sets:1,reps:"5–8 min walk, 3% incline",weight:"—",rest:0},
    {name:"Back Squat",sets:4,reps:"8 / 6 / 5×5 / 3×3 by phase",weight:"Squat Rack",rest:120,
     note:"Base 4×8@65% · Build 4×6@75% · Specific 5×5@80% · Peak 3×3@85% · Taper 3×5@65%"},
    {name:"Romanian Deadlift",sets:3,reps:"8–10",weight:"Barbell",rest:90},
    {name:"Bulgarian Split Squat",sets:3,reps:"8 each leg",weight:"Dumbbell (goblet or single)",rest:75},
    {name:"Walking Lunge",sets:3,reps:"12 each leg",weight:"Dumbbell, switch sides each set",rest:75},
    {name:"Calf Raise",sets:3,reps:"15",weight:"Barbell or Dumbbell",rest:45},
    {name:"Farmer Carry (single arm)",sets:3,reps:"50 ft each side",weight:"Heaviest dumbbell",rest:60},
    {name:"Dead Hang",sets:3,reps:"Max hold — target 30→60 sec",weight:"Pull-down bar",rest:60},
    {name:"Plank Hold",sets:3,reps:"45–60 sec",weight:"Bodyweight",rest:45},
  ]},
  Tuesday:{label:"Speed Run + Core",type:"cardio",icon:"🏃",exercises:[
    {name:"Treadmill Warm-Up",sets:1,reps:"5 min walk + 5 min easy jog",weight:"—",rest:0},
    {name:"Treadmill Intervals",sets:1,reps:"See phase note below",weight:"Race-pace effort",rest:90,
     note:"Base: 4×400m RPE7, 90s rest · Build: 6×400m 5K pace, 60s rest · Specific: 4×800m threshold, 90s rest · Peak: Pyramid 200/400/600/800/600/400/200 · Taper: 4×200m strides"},
    {name:"Hanging Knee Raise",sets:3,reps:"10",weight:"Pull-down bar",rest:45},
    {name:"Hollow Body Hold",sets:3,reps:"30 sec",weight:"Bodyweight",rest:30},
    {name:"Russian Twist",sets:3,reps:"20 total",weight:"Dumbbell",rest:45},
    {name:"Side Plank",sets:3,reps:"30 sec per side",weight:"Bodyweight",rest:30},
    {name:"Bird Dog",sets:3,reps:"10 per side",weight:"Bodyweight",rest:30},
  ]},
  Wednesday:{label:"Upper Pull + Push",type:"strength",icon:"💪",exercises:[
    {name:"Treadmill Warm-Up",sets:1,reps:"5 min easy walk",weight:"—",rest:0},
    {name:"Pull-Ups / Lat Pulldown",sets:4,reps:"Max – 1 rep shy of failure (or 8–10 pulldown)",weight:"Bodyweight / Pull-down Machine",rest:90,
     note:"Goal: work toward unassisted pull-ups. Heavy lat pulldown until then."},
    {name:"Barbell Bench Press",sets:4,reps:"8 / 6 / 5×5 / 3×3 by phase",weight:"Barbell",rest:90,
     note:"Base 4×8@65% · Build 4×6@75% · Specific 5×5@80% · Peak 3×3@85% · Taper 3×5@65%"},
    {name:"Bent-Over Barbell Row",sets:4,reps:"8–10",weight:"Barbell",rest:90},
    {name:"Single-Arm DB Row",sets:3,reps:"10 per side",weight:"Heaviest dumbbell, knee on bench",rest:60},
    {name:"Standing Overhead Press",sets:3,reps:"8",weight:"Barbell",rest:75},
    {name:"Lat Pulldown (wide grip)",sets:3,reps:"12 with 2-sec hold at chest",weight:"Pull-down Machine",rest:60},
    {name:"Bucket / Plate Carry",sets:3,reps:"100 ft",weight:"50 lb gym bag or hugged plate",rest:60},
    {name:"Hollow Body Hold",sets:3,reps:"30 sec",weight:"Bodyweight",rest:30},
  ]},
  Thursday:{label:"Hill Run + Mobility",type:"cardio",icon:"⛰️",exercises:[
    {name:"Treadmill Hill Run",sets:1,reps:"Base: 30 min · Build: 40 min · Specific: 45–55 min",weight:"Zone 2 — 116–134 bpm",rest:0,
     note:"Base: 5min flat / 5min @5% incline · Build: 7min blocks @6–7% · Specific: 8×(3min @7–10% / 3min flat) · Peak: race-pace + random 90s surges every 4 min"},
    {name:"Foam Roll",sets:1,reps:"60 sec each — quads, IT band, glutes, calves",weight:"—",rest:0},
    {name:"90/90 Hip Stretch",sets:1,reps:"60 sec per side",weight:"—",rest:0},
    {name:"Ankle Wall Stretch",sets:1,reps:"30 sec per side",weight:"—",rest:0},
    {name:"Cat-Cow",sets:1,reps:"10 reps",weight:"—",rest:0},
    {name:"Thoracic Extension on Foam Roller",sets:1,reps:"60 sec",weight:"—",rest:0},
  ]},
  Friday:{label:"OCR Metcon — Race Sim",type:"metcon",icon:"🏆",exercises:[
    {name:"Warm-Up Jog",sets:1,reps:"5 min easy",weight:"—",rest:0},
    {name:"Warm-Up Burpees",sets:1,reps:"10 at moderate pace",weight:"Bodyweight",rest:0},
    {name:"Circuit: Burpees",sets:1,reps:"10",weight:"Bodyweight",rest:0,
     note:"Do the full circuit for rounds: Base 3 rounds (2 min rest) · Build 4 rounds (90s rest) · Specific 5 rounds (60s rest) · Peak 4 rounds race pace · Taper 2 rounds easy"},
    {name:"Circuit: DB Thrusters",sets:1,reps:"10",weight:"50 lb dumbbell (or max)",rest:0},
    {name:"Circuit: Pull-Ups / Lat Pulldown",sets:1,reps:"8 pull-ups or 12 heavy pulldowns",weight:"Bodyweight / Machine",rest:0},
    {name:"Circuit: Farmer Carry",sets:1,reps:"100 ft",weight:"Heaviest dumbbell(s)",rest:0},
    {name:"Circuit: Box Step-Ups with DB",sets:1,reps:"15",weight:"Dumbbell + bench",rest:0},
    {name:"Circuit: Mountain Climbers",sets:1,reps:"20",weight:"Bodyweight",rest:0},
    {name:"Circuit: Bear Crawl",sets:1,reps:"30 sec",weight:"Bodyweight",rest:0},
    {name:"Circuit: Treadmill Run",sets:1,reps:"400 m at moderate-hard, 5% incline",weight:"—",rest:120},

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
const todayKey = () => TODAY.toISOString().split("T")[0];
const ls  = (k,d) => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } };
const sv  = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };
const getCals   = () => ls("cal_"+todayKey(), {breakfast:[],lunch:[],dinner:[]});
const saveCals  = c  => sv("cal_"+todayKey(), c);
const getWater  = () => ls("water_"+todayKey(), 0);

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getWeekStart(d){ const dt=new Date(d),day=dt.getDay(); dt.setDate(dt.getDate()-day+(day===0?-6:1)); dt.setHours(0,0,0,0); return dt; }
function fmtDate(d){ return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function getDayName(d){ return d.toLocaleDateString("en-US",{weekday:"long"}); }
function pct(v,m){ return Math.min(100,Math.round((v/m)*100)); }
function calcTotals(c){
  return [...c.breakfast,...c.lunch,...c.dinner]
    .reduce((s,i)=>({calories:s.calories+(i.calories||0),protein:s.protein+(i.protein||0),carbs:s.carbs+(i.carbs||0),fat:s.fat+(i.fat||0)}),
    {calories:0,protein:0,carbs:0,fat:0});
}

function selDay(d){ wDay=d; renderSelector(); }
 
function startWorkout(){
  wInProgress=true; wExIdx=0; wSets={}; wResting=false;

  renderActive();
}
 
function renderActive(){
  const page=document.getElementById('page-workout');
  const wo=PLAN[wDay];
  const allDone = wExIdx >= wo.exercises.length;
  const progPct = Math.round((wExIdx/wo.exercises.length)*100);
 
  if(wResting){
    page.innerHTML=`
      <div class="page-header">💪 ${wo.label.toUpperCase()}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progPct}%"></div></div>
      <div class="ex-progress">${wExIdx} / ${wo.exercises.length} done</div>

        <div class="rest-timer-num" id="rest-num">${wRestSec}s</div>

      </div>`;
    return;
  }
 
  if(allDone){
    page.innerHTML=`
      <div class="page-header">💪 WORKOUT</div>
      <div class="done-box">
        <div style="font-size:60px">🏆</div>
        <div class="done-title">WORKOUT COMPLETE!</div>
        <div class="done-sub">AROO! AROO! AROO!</div>
        <button class="big-btn" onclick="finishWorkout()">SAVE & FINISH</button>
      </div>`;
    return;
  }
 
  const ex = wo.exercises[wExIdx];
  const setsDone = wSets[`${wDay}_${wExIdx}`] || 0;
  const dots = Array.from({length:ex.sets},(_,i)=>`<div class="set-dot${i<setsDone?' done':''}">${i+1}</div>`).join('');
 
  page.innerHTML=`
    <div class="page-header">💪 ${wo.label.toUpperCase()}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progPct}%"></div></div>
    <div class="ex-progress">${wExIdx+1} / ${wo.exercises.length}</div>

      <div class="active-ex-detail">${ex.reps}</div>
      <div class="active-ex-weight">${ex.weight}</div>
      <div class="sets-row">${dots}</div>
      ${ex.note?`<div style="font-size:11px;color:var(--purple);margin-top:14px;font-family:'Inter',sans-serif;text-align:left;background:#0f0a20;border-radius:6px;padding:8px">📋 ${ex.note}</div>`:''}

    <button class="big-btn" onclick="logSet(${wExIdx})">✓ SET ${setsDone+1} DONE</button>
    <button class="ghost-btn" onclick="skipEx()">Skip Exercise</button>`;
}
 
function logSet(i){
  const ex=PLAN[wDay].exercises[i];
  const key=`${wDay}_${i}`;
  const done=(wSets[key]||0)+1;
  wSets[key]=done;
  if(done<ex.sets){ ex.rest>0 ? startRest(ex.rest) : renderActive(); }
  else{ wExIdx=i+1; (wExIdx<PLAN[wDay].exercises.length && ex.rest>0) ? startRest(ex.rest) : renderActive(); }
}
 
function skipEx(){ wExIdx++; renderActive(); }
 
function startRest(s){
  wResting=true; wRestSec=s; renderActive();
  wRestIv=setInterval(()=>{
    wRestSec--;
    const el=document.getElementById('rest-num');
    if(el) el.textContent=wRestSec+'s';
    if(wRestSec<=0){ clearInterval(wRestIv); wResting=false; renderActive(); }
  },1000);
}
 
function skipRest(){ if(wRestIv) clearInterval(wRestIv); wResting=false; renderActive(); }
 
function finishWorkout(){
  const wo=PLAN[wDay], h=getHist(), ph=getCurrentPhase();

}

// Camera
async function startCamera(){
  stopCamera();
  const errEl=document.getElementById('scan-err');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
    camStream=stream;
    const vid=document.getElementById('cam-video');
    if(!vid){ stopCamera(); return; }
    vid.srcObject=stream;
    await vid.play();
    // Try native BarcodeDetector (Chrome 83+, Android, Safari iOS 17+)
    if('BarcodeDetector' in window){
      const bd=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39']});
      const loop=async()=>{
        if(!camStream||!camStream.active) return;
        try{
          const codes=await bd.detect(vid);
          if(codes.length>0){ await fetchBarcode(codes[0].rawValue); return; }
        }catch{}
        requestAnimationFrame(loop);
      };
      vid.addEventListener('loadeddata',()=>loop(),{once:true});
    } else {
      if(errEl) errEl.textContent='Auto-scan not supported on this browser — enter barcode number manually below.';
    }
  }catch(e){
    if(errEl) errEl.textContent='Camera access denied. Please allow camera permission and try again, or enter barcode manually.';
  }
}
 
function stopCamera(){
  if(camReader){try{camReader.reset();}catch{}camReader=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}
 
function toggleScan(){ scanOpen=!scanOpen; scanResult=null; stopCamera(); renderNutrition(); }
function setMeal(m){ activeMeal=m; renderNutrition(); }
function addWater(oz){ saveWater(Math.min(MACRO.water*2, getWater()+oz)); renderNutrition(); }
function rmFood(meal,idx){ const c=getCals(); c[meal].splice(idx,1); saveCals(c); renderNutrition(); }
 
async function lookupBC(){
  const code=document.getElementById('bc-input')?.value?.trim();
  if(code) await fetchBarcode(code);
}
 
async function fetchBarcode(code){
  const errEl=document.getElementById('scan-err'), resEl=document.getElementById('scan-res');
  if(errEl) errEl.textContent='';
  if(resEl) resEl.innerHTML=`<div class="loading-msg">⏳ Looking up ${code}…</div>`;
  stopCamera();
  const LOCAL={"0049000028911":{name:"Gatorade 20oz",calories:140,protein:0,carbs:36,fat:0},"0038000845023":{name:"Special K Cereal",calories:120,protein:6,carbs:23,fat:0},"0021130126026":{name:"Chicken Breast 4oz",calories:130,protein:26,carbs:0,fat:2}};
  if(LOCAL[code]){scanResult=LOCAL[code];showScanResult();return;}
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const data=await r.json();
    if(data.status===1){
      const n=data.product.nutriments;
      scanResult={
        name:data.product.product_name||"Unknown Product",
        calories:Math.round(n["energy-kcal_serving"]||n["energy-kcal_100g"]||0),
        protein:Math.round((n.proteins_serving||n.proteins_100g||0)*10)/10,
        carbs:Math.round((n.carbohydrates_serving||n.carbohydrates_100g||0)*10)/10,
        fat:Math.round((n.fat_serving||n.fat_100g||0)*10)/10,
      };
      showScanResult();
    } else {
      if(resEl) resEl.innerHTML='';
      if(errEl) errEl.textContent='Product not found. Enter details manually below.';
    }
  }catch{
    if(resEl) resEl.innerHTML='';
    if(errEl) errEl.textContent='Lookup failed — check your connection or enter manually.';
  }
}
 
function showScanResult(){
  const el=document.getElementById('scan-res');
  if(!el||!scanResult) return;
  el.innerHTML=`<div class="scan-result-card">
    <div class="scan-result-name">${scanResult.name}</div>
    <div class="scan-result-meta">${scanResult.calories} kcal · Protein: ${scanResult.protein}g · Carbs: ${scanResult.carbs}g · Fat: ${scanResult.fat}g</div>
    <button class="add-food-btn" onclick="addScanned()">+ ADD TO ${activeMeal.toUpperCase()}</button>
  </div>`;
}
 
function addScanned(){
  if(!scanResult) return;
  const c=getCals(); c[activeMeal].push(scanResult); saveCals(c);
  scanResult=null; scanOpen=false; stopCamera(); renderNutrition();
}
 
function addManual(){
  const name=document.getElementById('fn')?.value?.trim();
  const cal=parseInt(document.getElementById('fc')?.value)||0;
  if(!name||!cal) return;
  const c=getCals();
  c[activeMeal].push({name,calories:cal,protein:parseInt(document.getElementById('fp')?.value)||0,carbs:parseInt(document.getElementById('fca')?.value)||0,fat:parseInt(document.getElementById('ff')?.value)||0});
  saveCals(c); renderNutrition();
}
 
// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const hist=getHist();
  const entries=Object.entries(hist).sort((a,b)=>b[0].localeCompare(a[0]));
  const total=entries.length;
  const strength=entries.filter(([,v])=>v.type==='strength').length;
  const cardio=entries.filter(([,v])=>v.type==='cardio').length;
  const metcon=entries.filter(([,v])=>v.type==='metcon').length;
 
  const cards=entries.length===0
    ?`<div class="empty-state">No workouts logged yet.<br>Complete a session to see your history here.</div>`
    :entries.map(([date,w])=>{
      const ph=w.phase||'—', wk=w.week||'—';
      return `<div class="history-card">
        <div class="history-date">${new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})} · Phase: ${ph} · Wk ${wk}</div>
        <div class="history-label">${w.icon||'💪'} ${w.label}</div>
        <div class="history-meta">${w.exercises} exercises · ${w.type}</div>
        <span class="done-badge" style="align-self:flex-start;margin-top:4px">✓ COMPLETE</span>
      </div>`;
    }).join('');
 
  document.getElementById('page-history').innerHTML=`
    <div class="page-header">📊 WORKOUT HISTORY</div>
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-card-num">${total}</div><div class="stat-card-label">TOTAL</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--purple)">${strength}</div><div class="stat-card-label">STRENGTH</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--green)">${cardio+metcon}</div><div class="stat-card-label">CARDIO</div></div>
    </div>
    ${cards}`;
}

renderHome();
